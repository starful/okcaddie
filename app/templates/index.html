<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <!-- SEO 및 메타 태그 -->
    <title>OKCaddie - Japan Golf Discovery Map</title>
    <meta name="description" content="Find the perfect golf course in Japan. Filter by budget, championship, and resorts on our interactive map.">
    <link rel="icon" href="/static/images/favicons.ico" type="image/x-icon">
    
    <!-- CSS 연결 -->
    <link rel="stylesheet" href="/static/css/style.css">

    <!-- 구글 애널리틱스 (GA4: G-5HBWT4CY75) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-5HBWT4CY75"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-5HBWT4CY75');
    </script>
</head>
<body>

    <header>
        <div class="container">
            <!-- [이미지 반영] 상단 1행: 로고(좌) + 언어버튼(우) -->
            <div class="header-main-row">
                <h1>
                    <a href="/">
                        <img src="/static/images/logo.png" alt="OKCaddie" class="logo-img">
                    </a>
                </h1>
                <div class="lang-selector">
                    <button class="lang-btn active" data-lang="en">EN</button>
                    <button class="lang-btn" data-lang="ko">KO</button>
                </div>
            </div>

            <!-- [이미지 반영] 하단 2행: 필터 버튼 섹션 -->
            <div class="theme-filter-container">
                <div class="theme-filter-buttons">
                    <!-- 아이콘을 data-en, data-ko에 포함시켜 JS가 교체할 때 유지되게 함 -->
                    <button class="theme-button active" data-theme="all" data-en="All" data-ko="전체">
                        전체 <span class="count-badge" id="count-all">0</span>
                    </button>
                    <button class="theme-button" data-theme="Value for Money" data-en="💰 Budget" data-ko="💰 가성비">
                        💰 가성비 <span class="count-badge" id="count-value">0</span>
                    </button>
                    <button class="theme-button" data-theme="Premium / Luxury" data-en="💎 Premium" data-ko="💎 프리미엄">
                        💎 프리미엄 <span class="count-badge" id="count-premium">0</span>
                    </button>
                    <button class="theme-button" data-theme="Public Tournament" data-en="🏆 Tour" data-ko="🏆 대회코스">
                        🏆 대회코스 <span class="count-badge" id="count-tour">0</span>
                    </button>
                    <button class="theme-button" data-theme="Stay & Play" data-en="🏨 Resort" data-ko="🏨 숙박/리조트">
                        🏨 숙박/리조트 <span class="count-badge" id="count-resort">0</span>
                    </button>
                    <button class="theme-button" data-theme="Easy Booking" data-en="📅 Easy" data-ko="📅 예약편리">
                        📅 예약편리 <span class="count-badge" id="count-easy">0</span>
                    </button>
                    <button class="theme-button" data-theme="Private Club" data-en="🔒 Private" data-ko="🔒 회원제">
                        🔒 회원제 <span class="count-badge" id="count-private">0</span>
                    </button>
                </div>
            </div>
        </div>
    </header>
    
    <main>
        <!-- 지도 섹션: 헤더가 슬림해진 만큼 더 넓게 보입니다 -->
        <section class="map-section">
            <div id="map"></div>
        </section>

        <div class="content-wrapper">
            <!-- 소개글: 모바일에서는 CSS에 의해 슬림해지거나 숨겨집니다 -->
            <article class="intro-box">
                <h2>⛳ Find Your Dream Golf Round in Japan</h2>
                <p>Explore 200+ curated golf courses. Plan your trip with our interactive map.</p>
            </article>

            <!-- 리스트 섹션 -->
            <section id="list-section">
                <h2 class="list-title">⛳ Featured Golf Courses</h2>
                <div id="course-list" class="course-grid"></div>
                <div id="scroll-sentinel" style="height: 20px;"></div>
            </section>
        </div>
    </main>

    <!-- 푸터 (메타데이터 정보 포함) -->
    {% include 'footer.html' %}

    <script>

        v: "beta"
    });
    </script>
    
    <!-- 비즈니스 로직 자바스크립트 -->
    <script type="module" src="/static/js/main.js"></script>
</body>
</html>
