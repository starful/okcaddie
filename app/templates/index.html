<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OKCaddie - Discover Japan's Best Golf Courses</title>
    <meta name="description" content="Find the perfect golf course in Japan. Filter by price, championship layout, and resort stays on our interactive map.">
    
    <link rel="icon" href="/static/images/favicons.ico" type="image/x-icon">
    <link rel="stylesheet" href="/static/css/style.css">

    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-5HBWT4CY75"></script>
    <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());

    gtag('config', 'G-5HBWT4CY75');
    </script>
</head>
<body>

    <header>
        <div class="container">
            <h1>
                <a href="/">
                    <img src="/static/images/logo.png" alt="OKCaddie" class="logo-img">
                </a>
            </h1>

            <div class="status-bar">
                <div class="status-badge">⛳ <span id="total-courses">0</span> Courses Listed</div>
                <div class="status-badge">📅 Updated: <span id="last-updated-date">-</span></div>
                <div class="status-badge highlight">🔄 Updating Weekly</div>
            </div>

            <div class="lang-selector">
                <button class="lang-btn active" data-lang="en">English</button>
                <button class="lang-btn" data-lang="ko">한국어</button>
            </div>

            <div class="theme-filter-buttons">
                <!-- id="count-OOO" 형태의 스팬을 추가합니다 -->
                <button class="theme-button active" data-theme="all" data-en="All" data-ko="전체">
                    All <span class="count-badge" id="count-all">0</span>
                </button>
                <button class="theme-button" data-theme="Value for Money" data-en="💰 Budget" data-ko="💰 가성비">
                    💰 가성비 <span class="count-badge" id="count-value">0</span>
                </button>
                <button class="theme-button" data-theme="Premium / Luxury" data-en="💎 Premium" data-ko="💎 프리미엄">
                    💎 프리미엄 <span class="count-badge" id="count-premium">0</span>
                </button>
                <button class="theme-button" data-theme="Public Tournament" data-en="🏆 Tour Course" data-ko="🏆 대회코스">
                    🏆 대회코스 <span class="count-badge" id="count-tour">0</span>
                </button>
                <button class="theme-button" data-theme="Stay & Play" data-en="🏨 Resort" data-ko="🏨 숙박/리조트">
                    🏨 숙박/리조트 <span class="count-badge" id="count-resort">0</span>
                </button>
                <button class="theme-button" data-theme="Easy Booking" data-en="📅 Easy Book" data-ko="📅 예약편리">
                    📅 예약편리 <span class="count-badge" id="count-easy">0</span>
                </button>
                <button class="theme-button" data-theme="Private Club" data-en="🔒 Private" data-ko="🔒 회원제">
                    🔒 회원제 <span class="count-badge" id="count-private">0</span>
                </button>
            </div>
        </div>
    </header>
    
    <main>
        <section class="map-section"><div id="map"></div></section>

        <div class="content-wrapper">
            <article class="intro-box">
                <h2>⛳ Find Your Dream Golf Round in Japan</h2>
                <p>Discover 200+ curated golf courses across Japan. Filter by price and accessibility to plan your perfect golf trip.</p>
            </article>

            <section id="list-section">
                <h2 class="list-title">⛳ Featured Golf Courses</h2>
                <div id="course-list" class="course-grid"></div>
                <div id="scroll-sentinel" style="height: 20px; width: 100%;"></div>
            </section>
        </div>
    </main>

    {% include 'footer.html' %}

    <script>
    // index.html 하단 부분
    (g=>{var h,a,k,p="The Google Maps JavaScript API",c="google",l="importLibrary",q="__ib__",m=document,b=window;b=b[c]||(b[c]={});...})({
        // [수정] 아래 key 부분에 제공해주신 API 키를 넣으세요
        key: "AIzaSyCPw703sTZuXYzd0o7WP8x5lkPaoEjiaQs",
        v: "beta"
    });
    </script>
    <script type="module" src="/static/js/main.js"></script>
</body>
</html>
