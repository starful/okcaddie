<!DOCTYPE html>
<html lang="{{ post.lang }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ post.title }} - OKCaddie</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="container">
        <header style="padding: 40px 20px; text-align: center;">
            <a href="/"><img src="/static/images/logo.png" alt="OKCaddie" style="height: 60px; display: block; margin: 0 auto;"></a>
        </header>

        <article class="detail-container">
            <div class="detail-header">
                <h1 class="detail-title">{{ post.title }}</h1>
                <div class="detail-meta">
                    📍 {{ post.address }} | 🏷️ {{ post.categories|join(', ') }}
                </div>
            </div>

            <img src="{{ post.thumbnail }}" alt="{{ post.title }}" class="detail-img">

            <div class="detail-content">
                {{ content | safe }}
            </div>

            {% if post.booking %}
            <div style="text-align: center; margin: 40px 0;">
                <a href="{{ post.booking }}" target="_blank" rel="nofollow" 
                   style="display: inline-block; background-color: #27ae60; color: white; padding: 18px 35px; font-size: 1.2rem; font-weight: bold; border-radius: 35px; text-decoration: none; box-shadow: 0 4px 15px rgba(39, 174, 96, 0.3);">
                    ⛳ Book This Course / Check Tee Times
                </a>
            </div>
            {% endif %}

            <div style="text-align: center;">
                <a href="/" class="back-btn">🗺️ Back to Map</a>
            </div>
        </article>
        
        {% include 'footer.html' %}
    </div>
</body>
</html>
