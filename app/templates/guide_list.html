<!DOCTYPE html>
<html lang="{{ lang }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Golf Guides - OKCaddie</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    {% include 'header.html' %}

    <main class="container" style="margin-top: 40px; margin-bottom: 100px;">
        <h1 class="list-title" style="text-align: left; margin-bottom: 40px;">
            📖 {{ '일본 골프 완벽 가이드' if lang == 'ko' else 'Japan Golf Expert Guides' }}
        </h1>

        <!-- 가이드 전체 리스트 -->
        <div class="guide-highlight-grid" style="grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));">
            {% for guide in guides %}
            <a href="/guide/{{ guide.id }}" class="guide-highlight-card">
                <div class="guide-img-wrapper" style="height: 200px;"><img src="{{ guide.image }}" alt=""></div>
                <div class="card-body">
                    <div style="font-size: 0.8rem; color: #999; margin-bottom: 5px;">{{ guide.date }}</div>
                    <h3 style="font-size: 1.2rem; margin-bottom: 10px;">{{ guide.title }}</h3>
                    <p>{{ guide.summary }}</p>
                </div>
            </a>
            {% endfor %}
        </div>

        <div class="back-btn-container" style="text-align: center; margin-top: 60px;">
            <a href="/?lang={{ lang }}" class="back-btn">🗺️ {{ '지도로 돌아가기' if lang == 'ko' else 'Back to Map' }}</a>
        </div>
    </main>

    {% include 'footer.html' %}
</body>
</html>
