<!-- app/templates/header.html -->
<header class="main-header">
    <div class="container">
        <div class="header-layout">
            <!-- 좌측 가이드 -->
            <div class="header-left">
                <a href="/guide?lang={{ active_lang or 'en' }}" class="nav-link">
                    📖 <span class="hide-mobile">{{ '가이드' if active_lang == 'ko' else 'Guides' }}</span>
                </a>
            </div>
            
            <!-- 중앙 로고 -->
            <div class="header-center">
                <a href="/?lang={{ active_lang or 'en' }}">
                    <img src="/static/images/logo.png" alt="OKCaddie" class="logo-img">
                </a>
            </div>
            
            <!-- 우측 언어 버튼 -->
            <div class="header-right lang-selector">
                {% if post and post.id %}
                    {% set base_id = post.id | replace('_ko', '') | replace('_en', '') %}
                    {% set path_prefix = '/guide/' if request.path.startswith('/guide') else '/course/' %}
                    <a href="{{ path_prefix }}{{ base_id }}_ko" class="lang-btn {{ 'active' if active_lang == 'ko' }}">KO</a>
                    <a href="{{ path_prefix }}{{ base_id }}_en" class="lang-btn {{ 'active' if active_lang == 'en' }}">EN</a>
                {% else %}
                    <a href="?lang=ko" class="lang-btn {{ 'active' if active_lang == 'ko' }}" data-lang="ko">KO</a>
                    <a href="?lang=en" class="lang-btn {{ 'active' if active_lang == 'en' }}" data-lang="en">EN</a>
                {% endif %}
            </div>
        </div>
    </div>
</header>
